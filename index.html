<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self Driving Neural Network</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="dashboard">
        <div>Generation: <span id="dash-gen">1</span></div>
        <div>Alive: <span id="dash-alive">0</span></div>
        <div>Distance: <span id="dash-dist">0</span></div>
        <div>Speed: <span id="dash-speed">0</span></div>
    </div>
    <div class="container">
        <div class="buttons">
            <div class="training-controls">
                <button id="pause-resume" onclick="togglePause()">Pause</button>
                <div class="speed-control">
                    <span>Speed:</span>
                    <button class="speed-btn active" data-speed="1" onclick="setSpeed(1)">1x</button>
                    <button class="speed-btn" data-speed="2" onclick="setSpeed(2)">2x</button>
                    <button class="speed-btn" data-speed="5" onclick="setSpeed(5)">5x</button>
                </div>
                <div class="mutation-control">
                    <label for="mutation-slider">Mutation: <span id="mutation-value">0.2</span></label>
                    <input type="range" id="mutation-slider" min="0.01" max="0.5" step="0.01" value="0.2" oninput="setMutationRate(this.value)">
                </div>
                <button id="reset-gen" onclick="resetGeneration()">Reset generation</button>
                <button id="hard-mode-btn" onclick="toggleHardMode()" style="background-color: rgb(100, 149, 237); color: white;">Hard Mode: OFF</button>
                <button id="collision-btn" onclick="toggleCollision()" style="background-color: rgb(100, 149, 237); color: white;">Collision Box: ON</button>
                <div class="storage-controls">
                    <button id="save" onclick="save()">Click to save network</button>
                    <button id="delete" onclick="remove()">Click to delete from LS</button>
                </div>
            </div>
        </div>
        <canvas id="canvas-car"></canvas>
        <canvas id="canvas-visualizer"></canvas>
    </div>
    <script src="NetworkVisualizer.js"></script>
    <script src="NeuralNetwork.js"></script>
    <script src="CollisionDetection.js"></script>
    <script src="util.js"></script>
    <script src="car.js"></script>
    <script src="script.js"></script>
</body>
</html>
